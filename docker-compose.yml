version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nse_db
    restart: always
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: nse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d nse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nse_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db:5432/nse_db?schema=public
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: nse_scraper
    restart: always
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db:5432/nse_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
